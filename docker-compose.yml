services:
  app:
    build: ./app
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/postgres"
      DOWNSTREAM_URL: "http://toxiproxy:8666"
      MAX_DB_INFLIGHT: "10"
      CHAOS_MEM_LIMIT_MB: "800"
      CHAOS_FD_LIMIT: "5000"
      ENABLE_STRACE: "1"
      STRACE_FILTER: "%network,%file,%process,%desc,%signal"
    volumes:
      - ./data/app:/data
    depends_on:
      - postgres
      - toxiproxy
    restart: unless-stopped

  learner:
    build: ./learner
    ports:
      - "8100:8100"
    environment:
      PROM_BASE: "http://prometheus:9090"
      POLL_SEC: "2.0"
      BOOTSTRAP_SAMPLES: "${BOOTSTRAP_SAMPLES:-180}"
      SOM_ROWS: "${SOM_ROWS:-32}"
      SOM_COLS: "${SOM_COLS:-32}"
      SOM_LR: "${SOM_LR:-0.25}"
      SOM_SIGMA: "${SOM_SIGMA:-3.0}"
      ANOMALY_QUANTILE: "${ANOMALY_QUANTILE:-0.85}"
      SOM_SCORING_MODE: "${SOM_SCORING_MODE:-ubl_area}"
      SOM_SMOOTH_K: "${SOM_SMOOTH_K:-5}"
      ANOMALY_STREAK: "${ANOMALY_STREAK:-3}"
      ALARM_LOG_MIN_INTERVAL_S: "${ALARM_LOG_MIN_INTERVAL_S:-0}"
      SOM_KFOLD: "${SOM_KFOLD:-3}"
      SOM_INIT_TRIALS: "${SOM_INIT_TRIALS:-3}"
      SOM_NORMALIZATION_MODE: "${SOM_NORMALIZATION_MODE:-train_max_100}"
      SOM_ONLINE_CLIP_MODE: "${SOM_ONLINE_CLIP_MODE:-none}"
      SOM_CAUSE_Q: "${SOM_CAUSE_Q:-5}"
    volumes:
      - ./data/learner:/data
    depends_on:
      - app
      - prometheus
    restart: unless-stopped

  loadgen:
    build: ./loadgen
    environment:
      LOADGEN_APP_URL: "http://app:8000"
      LOADGEN_PROFILE: "${LOADGEN_PROFILE:-steady}"
      LOADGEN_RPS: "${LOADGEN_RPS:-5.0}"
      LOADGEN_WORK_MS: "${LOADGEN_WORK_MS:-20}"
      LOADGEN_JITTER: "${LOADGEN_JITTER:-0.1}"
      LOADGEN_TIMEOUT_S: "${LOADGEN_TIMEOUT_S:-1.5}"
      LOADGEN_PATHS: "${LOADGEN_PATHS:-/work}"
      LOADGEN_SEED: "${LOADGEN_SEED:-42}"
    depends_on:
      - app
    restart: unless-stopped

  downstream:
    build: ./downstream
    ports:
      - "9000:9000"
    restart: unless-stopped

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest
    ports:
      - "8474:8474"
      - "8666:8666"
    depends_on:
      - downstream
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    depends_on:
      - app
      - cadvisor
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  chaos:
    build: ./chaos
    depends_on:
      - app
      - toxiproxy
    profiles: ["tools"]
    environment:
      APP_BASE: "http://app:8000"
      TOXI_BASE: "http://toxiproxy:8474"
