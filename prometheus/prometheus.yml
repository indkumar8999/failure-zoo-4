global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "learner"
    metrics_path: /metrics
    static_configs:
      - targets: ["learner:8100"]
