# Fault geometry ablations: fault family × intensity × duration with a fixed paper-style learner.
# No SOM/threshold ablations here (single variant; no pending_window_s_ladder / anomaly_quantile_ladder).
#
# Planned runs (full mode): 4 faults × 3 intensity × 3 duration × len(seeds) × repeats
#   => 4 × 3 × 3 × 1 × 1 = 36 runs with seeds [42] and repeats: 1 below.
# Smoke mode trims ladders to one step each (see run_experiments.maybe_trim_for_smoke).
#
# Usage:
#   python3 experiments/run_experiments.py --mode smoke --matrix experiments/fault_matrix_fault_geometry_paper_learner.yaml
#   python3 experiments/run_experiments.py --mode full  --matrix experiments/fault_matrix_fault_geometry_paper_learner.yaml
#
# Prefer --mode full for this matrix: smoke caps bootstrap (e.g. 15s) and BOOTSTRAP_SAMPLES, which can cause
# flaky training, missing som_model.npz on the host, and /status mismatches across runs. Smoke is only a wiring check.
#
# Smaller wall-clock (8 runs, same full timings): use fault_matrix_fault_geometry_paper_learner_minimal.yaml with --mode full.

meta:
  name: "ubl_fault_geometry_paper_learner_v1"
  description: "Ablate fault family, intensity, and inject duration; learner fixed to paper-faithful UBL profile."
  comparator_scope: "pca_knn_not_included"
  seed: 42
  seeds: [42]
  warmup_s: 60
  bootstrap_s: 240
  inject_s: 180
  cooldown_s: 90
  repeats: 1
  use_ladders: true
  pending_window_s: 60
  fault_window_on_delay_s: 14
  prediction_target_mode: "injection_onset"
  study_scope: "paper_faithful"
  ablation_block: "fault"
  hypothesis_id: "H-fault-geometry"
  interpretation_note: "Fault intensity/duration sweep; detector frozen to paper-faithful SOM/UBL settings."
  loadgen_enabled: true
  loadgen_profile: "steady"
  loadgen_rps: 6
  loadgen_ms: 20
  train_mode: "fresh_bootstrap"

learner:
  variants:
    - name: "paper_fidelity_fault_geometry"
      study_scope: "paper_faithful"
      ablation_block: "decision"
      hypothesis_id: "H-paper-learner-fixed"
      interpretation_note: "Paper-faithful-with-proxy learner; identical across all fault cells."
      train_mode: "fresh_bootstrap"
      env:
        SOM_SCORING_MODE: "ubl_area"
        SOM_SMOOTH_K: "5"
        ANOMALY_STREAK: "3"
        ANOMALY_QUANTILE: "0.85"
        POLL_SEC: "1.0"
        SOM_ROWS: "32"
        SOM_COLS: "32"
        SOM_LR: "0.7"
        SOM_SIGMA: "4.0"
        SOM_KFOLD: "3"
        SOM_INIT_TRIALS: "3"
        SOM_NORMALIZATION_MODE: "train_max_100"
        SOM_ONLINE_CLIP_MODE: "none"
        SOM_CAUSE_Q: "5"
        BOOTSTRAP_SAMPLES: "180"

faults:
  - id: "mem_leak"
    family: "paper_aligned"
    proxy_mapping: true
    ablation_block: "fault"
    command_on: ["memleak", "on", "{intensity}"]
    command_off: ["memleak", "off"]
    intensity: 50
    intensity_ladder:
      - level: low
        value: 20
      - level: medium
        value: 50
      - level: high
        value: 80
    duration_ladder_s:
      - level: short
        value: 60
      - level: medium
        value: 180
      - level: long
        value: 300

  - id: "cpu_hog_like"
    family: "paper_aligned"
    proxy_mapping: true
    ablation_block: "fault"
    command_on: ["cpu", "on", "{intensity}"]
    command_off: ["cpu", "off"]
    intensity: 4
    intensity_ladder:
      - level: low
        value: 2
      - level: medium
        value: 4
      - level: high
        value: 8
    duration_ladder_s:
      - level: short
        value: 60
      - level: medium
        value: 180
      - level: long
        value: 300

  - id: "net_hog_like_latency"
    family: "paper_aligned"
    proxy_mapping: true
    ablation_block: "fault"
    command_on: ["net", "latency", "{intensity}"]
    command_off: ["net", "clear"]
    intensity: 400
    intensity_ladder:
      - level: low
        value: 150
      - level: medium
        value: 400
      - level: high
        value: 700
    duration_ladder_s:
      - level: short
        value: 60
      - level: medium
        value: 180
      - level: long
        value: 300

  - id: "lock_convoy"
    family: "extended"
    proxy_mapping: true
    ablation_block: "fault"
    command_on: ["lock", "on", "{intensity}"]
    command_off: ["lock", "off"]
    intensity: 60
    intensity_ladder:
      - level: low
        value: 20
      - level: medium
        value: 40
      - level: high
        value: 60
    duration_ladder_s:
      - level: short
        value: 30
      - level: medium
        value: 60
      - level: long
        value: 90
