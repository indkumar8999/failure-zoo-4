meta:
  name: "ubl_research_stage1_paper_geometry"
  description: "Stage 1 paper-aligned geometry baseline: fixed paper-faithful learner, sweep fault intensity and duration."
  comparator_scope: "pca_knn_not_included"
  seed: 42
  seeds: [41, 42]
  warmup_s: 60
  bootstrap_s: 240
  inject_s: 180
  cooldown_s: 90
  repeats: 1
  use_ladders: true
  pending_window_s: 60
  fault_window_on_delay_s: 14
  prediction_target_mode: "injection_onset"
  study_scope: "paper_faithful"
  ablation_block: "fault"
  hypothesis_id: "H-research-stage1-paper-geometry"
  interpretation_note: "Estimate paper-aligned fault geometry effects before boundary and transfer stages."
  loadgen_enabled: true
  loadgen_profile: "steady"
  loadgen_rps: 6
  loadgen_ms: 20
  train_mode: "fresh_bootstrap"

learner:
  variants:
    - name: "paper_fidelity_research_anchor"
      study_scope: "paper_faithful"
      ablation_block: "decision"
      hypothesis_id: "H-paper-learner-fixed"
      interpretation_note: "Paper-faithful-with-proxy learner; only fault geometry changes across cells."
      train_mode: "fresh_bootstrap"
      env:
        SOM_SCORING_MODE: "ubl_area"
        SOM_SMOOTH_K: "5"
        ANOMALY_STREAK: "3"
        ANOMALY_QUANTILE: "0.85"
        POLL_SEC: "1.0"
        SOM_ROWS: "32"
        SOM_COLS: "32"
        SOM_LR: "0.7"
        SOM_SIGMA: "4.0"
        SOM_KFOLD: "3"
        SOM_INIT_TRIALS: "3"
        SOM_NORMALIZATION_MODE: "train_max_100"
        SOM_ONLINE_CLIP_MODE: "none"
        SOM_CAUSE_Q: "5"
        BOOTSTRAP_SAMPLES: "180"

faults:
  - id: "mem_leak"
    family: "paper_aligned"
    proxy_mapping: true
    ablation_block: "fault"
    command_on: ["memleak", "on", "{intensity}"]
    command_off: ["memleak", "off"]
    intensity: 50
    intensity_ladder:
      - level: low
        value: 20
      - level: high
        value: 80
    duration_ladder_s:
      - level: short
        value: 60
      - level: long
        value: 300

  - id: "cpu_hog_like"
    family: "paper_aligned"
    proxy_mapping: true
    ablation_block: "fault"
    command_on: ["cpu", "on", "{intensity}"]
    command_off: ["cpu", "off"]
    intensity: 4
    intensity_ladder:
      - level: low
        value: 2
      - level: high
        value: 8
    duration_ladder_s:
      - level: short
        value: 60
      - level: long
        value: 300

  - id: "net_hog_like_latency"
    family: "paper_aligned"
    proxy_mapping: true
    ablation_block: "fault"
    command_on: ["net", "latency", "{intensity}"]
    command_off: ["net", "clear"]
    intensity: 400
    intensity_ladder:
      - level: low
        value: 150
      - level: high
        value: 700
    duration_ladder_s:
      - level: short
        value: 60
      - level: long
        value: 300
