meta:
  name: "ubl_research_stage2_cross_family_geometry"
  description: "Stage 2 cross-family geometry consolidation with fixed paper-faithful learner."
  comparator_scope: "pca_knn_not_included"
  seed: 42
  seeds: [42]
  warmup_s: 60
  bootstrap_s: 240
  inject_s: 180
  cooldown_s: 90
  repeats: 1
  use_ladders: true
  pending_window_s: 60
  fault_window_on_delay_s: 14
  prediction_target_mode: "injection_onset"
  study_scope: "paper_faithful"
  ablation_block: "fault"
  hypothesis_id: "H-research-stage2-cross-family-geometry"
  interpretation_note: "Consolidate geometry trends across paper-aligned and selected extended fault families."
  loadgen_enabled: true
  loadgen_profile: "steady"
  loadgen_rps: 6
  loadgen_ms: 20
  train_mode: "fresh_bootstrap"

learner:
  variants:
    - name: "paper_fidelity_research_anchor"
      study_scope: "paper_faithful"
      ablation_block: "decision"
      hypothesis_id: "H-paper-learner-fixed"
      interpretation_note: "Paper-faithful-with-proxy learner; only stage-specific fault geometry changes."
      train_mode: "fresh_bootstrap"
      env:
        SOM_SCORING_MODE: "ubl_area"
        SOM_SMOOTH_K: "5"
        ANOMALY_STREAK: "3"
        ANOMALY_QUANTILE: "0.85"
        POLL_SEC: "1.0"
        SOM_ROWS: "32"
        SOM_COLS: "32"
        SOM_LR: "0.7"
        SOM_SIGMA: "4.0"
        SOM_KFOLD: "3"
        SOM_INIT_TRIALS: "3"
        SOM_NORMALIZATION_MODE: "train_max_100"
        SOM_ONLINE_CLIP_MODE: "none"
        SOM_CAUSE_Q: "5"
        BOOTSTRAP_SAMPLES: "180"

faults:
  - id: "mem_leak"
    family: "paper_aligned"
    proxy_mapping: true
    ablation_block: "fault"
    hypothesis_id: "H-memleak-boundary-in-global-context"
    interpretation_note: "Track low-end mem_leak detectability while comparing against other families in the same stage."
    command_on: ["memleak", "on", "{intensity}"]
    command_off: ["memleak", "off"]
    intensity: 20
    intensity_ladder:
      - level: very_low
        value: 10
      - level: low
        value: 20
      - level: medium
        value: 40
    duration_ladder_s:
      - level: short
        value: 60
      - level: long
        value: 300

  - id: "cpu_hog_like"
    family: "paper_aligned"
    proxy_mapping: true
    ablation_block: "fault"
    hypothesis_id: "H-cpu-geometry-trend"
    interpretation_note: "Fast-onset family used to compare intensity and duration sensitivity against gradual faults."
    command_on: ["cpu", "on", "{intensity}"]
    command_off: ["cpu", "off"]
    intensity: 4
    intensity_ladder:
      - level: low
        value: 2
      - level: medium
        value: 4
      - level: high
        value: 8
    duration_ladder_s:
      - level: short
        value: 60
      - level: long
        value: 300

  - id: "net_hog_like_latency"
    family: "paper_aligned"
    proxy_mapping: true
    ablation_block: "fault"
    hypothesis_id: "H-net-latency-geometry-trend"
    interpretation_note: "Network stress family captures latency-driven geometry effects under fixed detector settings."
    command_on: ["net", "latency", "{intensity}"]
    command_off: ["net", "clear"]
    intensity: 400
    intensity_ladder:
      - level: low
        value: 150
      - level: medium
        value: 400
      - level: high
        value: 700
    duration_ladder_s:
      - level: short
        value: 60
      - level: long
        value: 300

  - id: "lock_convoy"
    family: "extended"
    proxy_mapping: true
    ablation_block: "fault"
    hypothesis_id: "H-lock-geometry-trend"
    interpretation_note: "Extended contention family acts as a transfer and saturation reference."
    command_on: ["lock", "on", "{intensity}"]
    command_off: ["lock", "off"]
    intensity: 40
    intensity_ladder:
      - level: low
        value: 20
      - level: medium
        value: 40
      - level: high
        value: 60
    duration_ladder_s:
      - level: short
        value: 30
      - level: long
        value: 90

  - id: "disk_fill"
    family: "extended"
    proxy_mapping: true
    ablation_block: "fault"
    hypothesis_id: "H-disk-geometry-trend"
    interpretation_note: "Extended storage pressure family captures behavior distinct from memory, CPU, and network families."
    command_on: ["disk", "fill", "{intensity}"]
    command_off: ["disk", "clear"]
    intensity: 2000
    intensity_ladder:
      - level: low
        value: 500
      - level: medium
        value: 2000
      - level: high
        value: 5000
    duration_ladder_s:
      - level: short
        value: 60
      - level: long
        value: 300
