meta:
  name: ubl_fault_matrix_v1
  description: Paper-aligned and extended fault campaigns for UBL-style evaluation.
  comparator_scope: pca_knn_not_included
  seed: 42
  seeds: [41, 42, 43]
  warmup_s: 10
  bootstrap_s: 15
  inject_s: 10
  cooldown_s: 10
  repeats: 2
  pending_window_s: 60
  baseline_slo_window_s: 30
  loadgen_enabled: true
  loadgen_profile: "steady"
  loadgen_rps: 4
  loadgen_ms: 20
  study_scope: "extended"
  ablation_block: "fault"
  hypothesis_id: "H-quick"
  interpretation_note: "Quick matrix for smoke-like multiseed checks."
learner:
  baseline_env:
    SOM_SCORING_MODE: ubl_area
    SOM_SMOOTH_K: 5
    ANOMALY_STREAK: 3
    ANOMALY_QUANTILE: 0.85
  variants:
  - name: paper_fidelity
    study_scope: "paper_faithful"
    ablation_block: "decision"
    hypothesis_id: "H-paper-anchor"
    interpretation_note: "Paper-faithful-with-proxy anchor."
    train_mode: "fresh_bootstrap"
    env:
      SOM_SCORING_MODE: ubl_area
      SOM_SMOOTH_K: 5
      ANOMALY_STREAK: 3
      ANOMALY_QUANTILE: 0.85
      POLL_SEC: 1.0
      SOM_ROWS: 32
      SOM_COLS: 32
      SOM_LR: 0.7
      SOM_SIGMA: 4.0
      SOM_KFOLD: 3
      SOM_INIT_TRIALS: 3
      SOM_NORMALIZATION_MODE: train_max_100
      SOM_ONLINE_CLIP_MODE: none
  - name: current_default
    study_scope: "extended"
    ablation_block: "decision"
    hypothesis_id: "H-baseline-comparison"
    interpretation_note: "Current default baseline comparator."
    train_mode: "warm_start"
    env:
      SOM_SCORING_MODE: bmu
      SOM_SMOOTH_K: 1
      ANOMALY_STREAK: 1
      ANOMALY_QUANTILE: 0.99
faults:
- id: mem_leak
  family: paper_aligned
  proxy_mapping: true
  ablation_block: "fault"
  command_on:
  - memleak
  - 'on'
  - '{intensity}'
  command_off:
  - memleak
  - 'off'
  intensity: 50
- id: cpu_hog_like
  family: paper_aligned
  proxy_mapping: true
  ablation_block: "fault"
  command_on:
  - cpu
  - 'on'
  - '{intensity}'
  command_off:
  - cpu
  - 'off'
  intensity: 4
- id: net_hog_like_latency
  family: paper_aligned
  proxy_mapping: true
  ablation_block: "fault"
  command_on:
  - net
  - latency
  - '{intensity}'
  command_off:
  - net
  - clear
  intensity: 400
- id: lock_convoy
  family: extended
  proxy_mapping: true
  ablation_block: "fault"
  command_on:
  - lock
  - 'on'
  - '{intensity}'
  command_off:
  - lock
  - 'off'
  intensity: 60
